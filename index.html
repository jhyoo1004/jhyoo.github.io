<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI 타자 분석기: 3할 타자 분류 모델</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 40px; }
        .container { background: white; width: 550px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        h1 { color: #0d47a1; font-size: 1.6rem; margin-bottom: 5px; }
        .description { color: #555; font-size: 0.95rem; margin-bottom: 25px; line-height: 1.5; }
        
        /* 입력 영역 */
        .input-section { background: #e3f2fd; padding: 25px; border-radius: 15px; margin-bottom: 25px; }
        .slider { width: 100%; height: 8px; border-radius: 5px; background: #bbdefb; outline: none; margin: 15px 0; }
        .avg-display { font-size: 2.5rem; font-weight: 800; color: #1565c0; }

        /* 판정 카드 */
        .result-card { padding: 30px; border-radius: 15px; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; overflow: hidden; }
        .is-pro { background: #1a237e; color: white; border: 3px solid #3f51b5; }
        .is-not { background: #ffffff; color: #333; border: 3px solid #eeeeee; }
        
        /* 확률 게이지 */
        .gauge-label { display: block; margin-top: 15px; font-size: 0.85rem; text-align: left; }
        .gauge-bg { background: #eee; height: 12px; border-radius: 6px; margin: 8px 0; overflow: hidden; }
        .gauge-fill { height: 100%; transition: width 0.4s ease, background-color 0.4s ease; }

        .decision-tag { font-size: 1.8rem; font-weight: bold; margin-top: 10px; }
        .formula { font-size: 0.85rem; color: #777; margin-top: 25px; border-top: 1px solid #eee; padding-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚾ AI 타자 분석 시스템</h1>
    <p class="description">시그모이드 함수를 통해 타율 데이터를 분석하고<br><strong>'3할 타자(Elite Hitter)'</strong> 여부를 분류합니다.</p>

    <div class="input-section">
        <label>현재 시즌 타율</label>
        <div class="avg-display">.<span id="avgText">300</span></div>
        <input type="range" id="avgSlider" class="slider" min="0" max="600" value="300">
        <div style="display: flex; justify-content: space-between; font-size: 0.8rem; color: #666;">
            <span>.000</span>
            <span>.300 (기준점)</span>
            <span>.600</span>
        </div>
    </div>

    <div id="card" class="result-card is-pro">
        <div style="text-align: left; font-weight: 600;">데이터 분석 결과:</div>
        <div style="font-size: 2.2rem; font-weight: 900; margin: 10px 0;">확률 <span id="probText">50.0</span>%</div>
        
        <div class="gauge-label">3할 타자일 확률 (Threshold: 0.5)</div>
        <div class="gauge-bg">
            <div id="fill" class="gauge-fill" style="width: 50%; background-color: #ffd600;"></div>
        </div>
        
        <div id="decision" class="decision-tag">분류: 3할 타자 (1)</div>
    </div>

    <div class="formula">
        <strong>교수학습 포인트:</strong><br>
        타율이 0.300 근처에서 확률이 급격히 변하는 <b>S-곡선(Sigmoid)</b>을 확인하세요.<br>
        연속적인 타율 값이 어떻게 0 또는 1로 분류되는지가 핵심입니다.
    </div>
</div>

<script>
    const slider = document.getElementById('avgSlider');
    const avgText = document.getElementById('avgText');
    const probText = document.getElementById('probText');
    const fill = document.getElementById('fill');
    const card = document.getElementById('card');
    const decision = document.getElementById('decision');

    slider.addEventListener('input', function() {
        const rawValue = parseInt(this.value);
        const displayVal = rawValue.toString().padStart(3, '0');
        avgText.innerText = displayVal;

        // 로지스틱 회귀 로직
        // 타율 0.300을 결정 경계(0.5)로 설정
        const x = rawValue / 1000;
        const w = 40; // 기울기를 높여 0.300 부근에서 가파른 S-곡선 형성
        const b = -w * 0.300; 
        const z = w * x + b;
        const p = 1 / (1 + Math.exp(-z));
        
        const probability = (p * 100).toFixed(1);
        probText.innerText = probability;
        fill.style.width = probability + "%";

        // 분류 결정 (0.5 기준)
        if (p >= 0.5) {
            card.className = "result-card is-pro";
            fill.style.backgroundColor = "#ffd600";
            decision.innerText = "분류: 3할 타자 (1)";
        } else {
            card.className = "result-card is-not";
            fill.style.backgroundColor = "#0d47a1";
            decision.innerText = "분류: 일반 타자 (0)";
        }
    });
</script>

</body>
</html>
