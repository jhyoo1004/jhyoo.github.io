<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로지스틱 회귀 체험 교구</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; padding: 20px; text-align: center; background: #f8f9fa; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: inline-block; width: 450px; }
        .slider { width: 100%; margin: 20px 0; cursor: pointer; }
        .result-area { margin-top: 20px; padding: 20px; border-radius: 10px; font-weight: bold; font-size: 24px; }
        .pass { background: #e3f2fd; color: #1976d2; }
        .fail { background: #ffebee; color: #d32f2f; }
        .prob-bar-container { background: #eee; height: 10px; border-radius: 5px; margin: 10px 0; overflow: hidden; }
        .prob-bar { height: 100%; transition: width 0.3s ease; }
    </style>
</head>
<body>
    <div class="card">
        <h2>로지스틱 회귀: 합격 예측기</h2>
        <p>공부 시간을 조절하며 확률의 변화를 확인하세요.</p>
        
        <div style="font-size: 1.2rem;">공부 시간: <span id="timeVal">5</span>시간</div>
        <input type="range" id="inputX" class="slider" min="0" max="10" step="0.1" value="5">
        
        <div class="prob-bar-container">
            <div id="bar" class="prob-bar" style="width: 50%; background: #4CAF50;"></div>
        </div>
        
        <div id="resultBox" class="result-area pass">
            합격 확률: <span id="prob">50.0</span>%<br>
            <span id="decision">판정: 합격(1)</span>
        </div>
        
        <p style="font-size: 0.9rem; color: #666; margin-top: 15px;">
            * 기준값(0.5)을 넘으면 '분류'가 바뀝니다.
        </p>
    </div>

    <script>
        const input = document.getElementById('inputX');
        input.addEventListener('input', (e) => {
            const x = e.target.value;
            document.getElementById('timeVal').innerText = x;
            
            // 지도서 기반 로직: 직선을 S-곡선으로 변환
            const z = 1.5 * (x - 5); 
            const p = 1 / (1 + Math.exp(-z));
            const probPercent = (p * 100).toFixed(1);
            
            document.getElementById('prob').innerText = probPercent;
            document.getElementById('bar').style.width = probPercent + "%";
            
            const resultBox = document.getElementById('resultBox');
            const decision = document.getElementById('decision');
            
            if (p >= 0.5) {
                resultBox.className = "result-area pass";
                decision.innerText = "판정: 합격 (1)";
            } else {
                resultBox.className = "result-area fail";
                decision.innerText = "판정: 불합격 (0)";
            }
        });
    </script>
</body>
</html>
